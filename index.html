<!DOCTYPE html>
<html lang="en">



<head>
  <title>Dietmaxxing</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>


<body>
<header id="hero">
    <h1>🥩 Dietmaxxing</h1>
    <p>Fuel your body with nutrient-dense whole foods.</p>
</header>

  <div id="cart" onclick="toggleCart()">
    <img src="cart.png" width="80px" height="80px">
    <span id="cartBadge">0</span>
  </div>


  <div id="cartDropdown">
    <div id="cartContents"></div>
    <hr>
    <b>Total: $<span id="cartTotal">0</span></b>
  </div>

  <div id="container">

    <div id="middle">
  <h1>Dietmaxxing</h1>
  </div>

  <h1>Order form -</h1>

  <h2>Name:</h2>
  <label for="formName"></label>
  <input placeholder="(E.g., Dave)" type="text" id="nameField" name="formName">
  <br>

  <h2>Money:</h2>
  <label for="formMoney">$</label>
  <input placeholder="$..." type="number" id="moneyField" name="formMoney">
  <br>

  <h2>Food:</h2>

  <div id="spaceForJavaScriptOutput">
  </div>

  <div id="receiptOutput"></div>

  <br>
  <input type="submit" onclick="getFormInput()">
  <input type="button" value="Reset Order" onclick="resetOrder()">

  <br>
  <br>

  <script src="script.js"></script>
</div>
  
<footer>
    <p>© 2026 Dietmaxxing • Eat clean • Run Fast • Live longer</p>
</footer>
</body>

</html>
